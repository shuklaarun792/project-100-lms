<!DOCTYPE html>
<html>
<head>
<title>Edit Author</title>

<style>

*{
box-sizing:border-box;
font-family:Arial;
}

body{
margin:0;
background:linear-gradient(135deg,#141e30,#243b55);
}


/* HEADER */

.header{
position:fixed;
top:0;
width:100%;
background:#0d0d26;
padding:18px 60px;
display:flex;
justify-content:space-between;
align-items:center;
color:white;
}

.logo{
font-size:22px;
font-weight:bold;
}

.nav a{
text-decoration:none;
color:white;
margin-left:30px;
font-size:16px;
}

.nav a:hover{
color:#00ffd5;
}


/* FORM SECTION */

.container{
max-width:720px;
margin:140px auto 60px auto;
}


/* CARD */

.card{
background:#efefef;
padding:40px;
border-radius:12px;
box-shadow:0 15px 35px rgba(0,0,0,0.3);
}

.card h2{
text-align:center;
margin-bottom:25px;
}


/* GRID */

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

input{
width:100%;
padding:13px;
border-radius:6px;
border:1px solid #ccc;
font-size:15px;
}


/* BUTTON */

button{
width:100%;
margin-top:20px;
padding:14px;
background:#28a745;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1e7e34;
}


/* BACK BUTTON */

.back-btn{
background:#2b2f77;
margin-top:10px;
}

.back-btn:hover{
background:#1b1e4a;
}

</style>

</head>

<body>


<!-- HEADER -->

<div class="header">

<div class="logo">📚 Library System</div>

<div class="nav">
<a href="/">Home</a>
<a href="{{ url_for('student.register_student')}}">Students</a>
<a href="{{ url_for('book.book_register')}}">Books</a>
<a href="{{ url_for('author.author_register')}}">Authors</a>
</div>

</div>


<div class="container">

<div class="card">

<h2>Edit Author</h2>

<form method="POST">

<div class="form-grid">

<input type="text" name="author_name" value="{{ author.author_name }}" required>

<input type="email" name="email" value="{{ author.email }}">

<input type="number" name="age" value="{{ author.age }}">

<input type="text" name="phone" value="{{ author.phone }}">

<input type="text" name="country" value="{{ author.country }}">

</div>

<button type="submit">Update Author</button>

</form>

<a href="{{ url_for('author.all_authors') }}">
<button class="back-btn">Back to Authors</button>
</a>

</div>

</div>

</body>
</html>
