<!DOCTYPE html>
<html>
<head>
<title>Author Registration</title>

<style>

*{
box-sizing:border-box;
font-family:Arial;
}

body{
margin:0;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

/* HEADER */

.header{
position:fixed;
top:0;
width:100%;
background:#0d0d26;
padding:18px 60px;
display:flex;
justify-content:space-between;
align-items:center;
color:white;
}

.logo{
font-size:22px;
font-weight:bold;
}

.nav a{
text-decoration:none;
color:white;
margin-left:30px;
font-size:16px;
}

.nav a:hover{
color:#00ffd5;
}

/* FORM SECTION */

.container{
max-width:720px;
margin:140px auto 60px auto;
}

/* CARD */

.card{
background:#efefef;
padding:40px;
border-radius:12px;
box-shadow:0 15px 35px rgba(0,0,0,0.3);
}

.card h2{
text-align:center;
margin-bottom:25px;
}

/* GRID */

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

input,textarea{
width:100%;
padding:13px;
border-radius:6px;
border:1px solid #ccc;
font-size:15px;
}

/* BIO FULL WIDTH */

.bio{
grid-column:span 2;
height:80px;
resize:none;
}

/* BUTTON */

button{
width:100%;
margin-top:20px;
padding:14px;
background:#e67e22;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#c96b1c;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<div class="logo">📚 Library System</div>

<div class="nav">
<a href="/">Home</a>
<a href="{{ url_for('student.register_student')}}">Students</a>
<a href="{{ url_for('book.book_register')}}">Books</a>
<a href="{{ url_for('author.author_register')}}">Authors</a>
</div>

</div>

<!-- FORM -->

<div class="container">

<div class="card">

<h2>Author Registration</h2>

<form method="POST">

<div class="form-grid">

<input type="text" name="author_name" placeholder="Author Name" required>

<input type="text" name="country" placeholder="Country">

<input type="date" name="dob">

<input type="text" name="genre" placeholder="Genre / Specialization">

<input type="number" name="books_written" placeholder="Books Written">

<input type="text" name="email" placeholder="Email">

<textarea name="bio" placeholder="Short Biography" class="bio"></textarea>

</div>

<button type="submit">Add Author</button>

</form>

</div>

</div>

</body>
</html>
