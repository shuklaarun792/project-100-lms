<!DOCTYPE html>
<html>
<head>
<title>Author Details</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}


/* Background */

body{
height:100vh;
background:linear-gradient(135deg,#667eea,#764ba2);
display:flex;
justify-content:center;
align-items:center;
}


/* Card */

.card{
width:550px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
border-radius:20px;
padding:40px;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
color:white;
}


/* Heading */

.card h2{
text-align:center;
margin-bottom:25px;
font-size:32px;
}


/* Details rows */

.detail{
margin:14px 0;
font-size:18px;
display:flex;
justify-content:space-between;
border-bottom:1px solid rgba(255,255,255,0.2);
padding-bottom:8px;
}


/* Label */

.label{
font-weight:bold;
}


/* Buttons */

.btn-group{
margin-top:30px;
display:flex;
gap:10px;
}


button{
flex:1;
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:15px;
color:white;
}


/* Button colors */

.edit{
background:#28a745;
}

.delete{
background:#dc3545;
}

.back{
background:#2b2f77;
}


button:hover{
opacity:0.9;
transform:scale(1.03);
}

</style>
</head>



<body>



<div class="card">

<h2>✍ Author Details</h2>


<div class="detail">
<span class="label">ID</span>
<span>{{ author.id }}</span>
</div>


<div class="detail">
<span class="label">Name</span>
<span>{{ author.author_name }}</span>
</div>


<div class="detail">
<span class="label">Email</span>
<span>{{ author.email }}</span>
</div>


<div class="detail">
<span class="label">Age</span>
<span>{{ author.age }}</span>
</div>


<div class="detail">
<span class="label">Phone</span>
<span>{{ author.phone }}</span>
</div>


<div class="detail">
<span class="label">Country</span>
<span>{{ author.country }}</span>
</div>



<div class="btn-group">

<a href="{{ url_for('author.edit_author', id=author.id) }}">
<button class="edit">Edit</button>
</a>

<a href="{{ url_for('author.delete_author', id=author.id) }}">
<button class="delete">Delete</button>
</a>

<a href="{{ url_for('author.all_authors') }}">
<button class="back">Back</button>
</a>

</div>


</div>



</body>
</html>
