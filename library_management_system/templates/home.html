<!DOCTYPE html>
<html>
<head>

<title>Library Dashboard</title>

<style>

*{
box-sizing:border-box;
font-family:Segoe UI;
}

body{

margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(135deg,#667eea,#764ba2);

}


/* DASHBOARD */

.dashboard{

width:820px;
padding:35px;

border-radius:18px;

background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);

box-shadow:0 15px 40px rgba(0,0,0,0.4);

text-align:center;

color:white;

}


/* TITLE */

.dashboard h1{

font-size:34px;
margin-bottom:5px;

}

.dashboard p{

opacity:0.9;
margin-bottom:30px;

}


/* GRID */

.grid{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:18px;

}


/* CARD */

.card{

padding:25px;

border-radius:14px;

background:rgba(255,255,255,0.2);

transition:0.3s;

cursor:pointer;

}

.card:hover{

transform:translateY(-5px);

background:#1e90ff;

}


/* ICON */

.card span{

font-size:32px;

}


/* TEXT */

.card h3{

margin-top:10px;
font-size:16px;

}


/* LOGOUT */

.logout{

margin-top:25px;

padding:10px 25px;

border:none;

border-radius:8px;

background:black;

color:white;

font-size:14px;

cursor:pointer;

transition:0.3s;

}

.logout:hover{

background:#ff4d4d;

}

a{
text-decoration:none;
color:white;
}

</style>

</head>


<body>


<div class="dashboard">


<h1>📚 Library Dashboard</h1>

<p>Welcome {{ session.user }} — Manage your Library System</p>


<div class="grid">


<a href="/student/student-register">
<div class="card">
<span>🎓</span>
<h3>Register Student</h3>
</div>
</a>


<a href="/author/author-register">
<div class="card">
<span>✍</span>
<h3>Register Author</h3>
</div>
</a>


<a href="/student/all-students">
<div class="card">
<span>📋</span>
<h3>View Students</h3>
</div>
</a>


<a href="/author/all-authors">
<div class="card">
<span>👨‍💻</span>
<h3>View Authors</h3>
</div>
</a>


<a href="/book/book-register">
<div class="card">
<span>📚</span>
<h3>Register Book</h3>
</div>
</a>


<a href="/book/book-register">
<div class="card">
<span>📖</span>
<h3>View Books</h3>
</div>
</a>


</div>


<a href="/logout">
<button class="logout">Logout</button>
</a>


</div>


</body>
</html>
