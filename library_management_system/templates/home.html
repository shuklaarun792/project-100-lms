<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Library Management System</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
background:linear-gradient(135deg,#1d2671,#c33764);
color:white;
}

/* HEADER BAR */

.header{
width:100%;
background:rgba(0,0,0,0.3);
padding:15px 50px;
display:flex;
justify-content:space-between;
align-items:center;
position:fixed;
top:0;
}

.logo{
font-size:22px;
font-weight:bold;
}

.nav a{
text-decoration:none;
color:white;
margin-left:25px;
font-size:16px;
transition:0.3s;
}

.nav a:hover{
color:#ffd700;
}

/* MAIN CONTAINER */

.main{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
text-align:center;
background:rgba(255,255,255,0.1);
padding:50px;
border-radius:15px;
backdrop-filter:blur(10px);
box-shadow:0 10px 30px rgba(0,0,0,0.3);
width:600px;
}

h1{
font-size:40px;
margin-bottom:10px;
}

p{
margin-bottom:30px;
font-size:18px;
opacity:0.9;
}

.nav-buttons{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.btn{
text-decoration:none;
color:white;
padding:15px 30px;
font-size:18px;
border-radius:8px;
background:linear-gradient(45deg,#ff512f,#dd2476);
transition:0.3s;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.btn:hover{
transform:translateY(-3px);
box-shadow:0 10px 25px rgba(0,0,0,0.4);
background:linear-gradient(45deg,#00c6ff,#0072ff);
}

.footer{
margin-top:30px;
font-size:14px;
opacity:0.8;
}

</style>
</head>

<body>

<!-- HEADER NAVBAR -->

<div class="header">

<div class="logo">📚 Shukla  Library</div>

<div class="nav">
<a href="/">Home</a>
<a href="{{ url_for('student.register_student')}}">Students</a>
<a href="{{ url_for('book.book_register')}}">Books</a>
<a href="{{ url_for('author.author_register')}}">Authors</a>
</div>

</div>


<div class="main">

<div class="container">

<h1>📚 Library Management System</h1>

<p>Manage Students, Books and Authors easily</p>

<div class="nav-buttons">

<a href="{{ url_for('student.register_student')}}" class="btn">👨‍🎓 Students</a>

<a href="{{ url_for('book.book_register')}}" class="btn">📖 Books</a>

<a href="{{ url_for('author.author_register')}}" class="btn">✍ Authors</a>

</div>

<div class="footer">
<p>Flask Powered Library System</p>
</div>

</div>

</div>

</body>
</html>
