<!DOCTYPE html>
<html>
<head>
<title>Student Details</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
}

.container{
width:500px;
margin:auto;
margin-top:100px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

h2{
text-align:center;
}

p{
font-size:18px;
}

</style>

</head>

<body>

<div class="container">

<h2>Student Details</h2>

<p><b>ID:</b> {{ student.id }}</p>
<p><b>Name:</b> {{ student.stu_name }}</p>
<p><b>Age:</b> {{ student.stu_age }}</p>
<p><b>Email:</b> {{ student.stu_email }}</p>
<p><b>Phone:</b> {{ student.stu_phone }}</p>
<p><b>Address:</b> {{ student.stu_address }}</p>

</div>

</body>
</html>
