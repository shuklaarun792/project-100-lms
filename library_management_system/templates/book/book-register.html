<!DOCTYPE html>
<html>
<head>
<title>Book Registration</title>

<style>

*{
box-sizing:border-box;
font-family:Arial;
}

body{
margin:0;
background:linear-gradient(135deg,#141e30,#243b55);
}

/* HEADER */

.header{
position:fixed;
top:0;
width:100%;
background:#0d0d26;
padding:18px 60px;
display:flex;
justify-content:space-between;
align-items:center;
color:white;
}

.logo{
font-size:22px;
font-weight:bold;
}

.nav a{
text-decoration:none;
color:white;
margin-left:30px;
font-size:16px;
}

.nav a:hover{
color:#00ffd5;
}

/* FORM SECTION */

.container{
max-width:720px;
margin:140px auto 60px auto;
}

/* CARD */

.card{
background:#efefef;
padding:40px;
border-radius:12px;
box-shadow:0 15px 35px rgba(0,0,0,0.3);
}

.card h2{
text-align:center;
margin-bottom:25px;
}

/* GRID */

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

input,select,textarea{
width:100%;
padding:13px;
border-radius:6px;
border:1px solid #ccc;
font-size:15px;
}

/* description full width */

.description{
grid-column:span 2;
height:80px;
resize:none;
}

/* BUTTON */

button{
width:100%;
margin-top:20px;
padding:14px;
background:#3498db;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#2c80b4;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<div class="logo">📚 Library System</div>

<div class="nav">
<a href="/">Home</a>
<a href="{{ url_for('student.register_student')}}">Students</a>
<a href="{{ url_for('book.book_register')}}">Books</a>
<a href="{{ url_for('author.author_register')}}">Authors</a>
</div>

</div>


<!-- FORM -->

<div class="container">

<div class="card">

<h2>Book Registration</h2>

<form method="POST">

<div class="form-grid">

<input type="text" name="book_title" placeholder="Book Title" required>

<input type="text" name="author_name" placeholder="Author Name">

<input type="text" name="isbn" placeholder="ISBN Number">

<input type="text" name="publisher" placeholder="Publisher">

<input type="number" name="year" placeholder="Publication Year">

<select name="category">
<option>Select Category</option>
<option>Programming</option>
<option>Science</option>
<option>Mathematics</option>
<option>History</option>
<option>Literature</option>
</select>

<input type="number" name="quantity" placeholder="Number of Copies">

<input type="text" name="language" placeholder="Language">

<textarea name="description" placeholder="Book Description" class="description"></textarea>

</div>

<button type="submit">Add Book</button>

</form>

</div>

</div>

</body>
</html>
